<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Eqdom</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0F1823;color:#fff;min-height:100vh}.c{max-width:480px;margin:0 auto;padding:20px}.b{background:#AB0017;color:#fff;border:none;padding:16px;border-radius:8px;width:100%;font-size:16px;margin:10px 0;cursor:pointer}.d{background:#1A2433;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:20px;margin:20px 0}input{width:100%;background:#0F1823;border:1px solid rgba(255,255,255,.1);padding:14px;border-radius:8px;color:#fff;margin:8px 0}h1{font-size:32px;margin:20px 0}h1 span{color:#AB0017}p{color:#86868B;margin:10px 0}.h{display:none}</style></head><body><div class="c" id="a"></div><script>const $=document.getElementById('a');let s='hero',m=50000,d=24;const t={hero:()=>`<div style="text-align:center;padding-top:40px"><span style="color:#AB0017;font-size:12px;letter-spacing:2px">GROUPE SAHAM</span><h1>Votre projet,<br/><span>notre financement.</span></h1><p>Une solution de crédit sur mesure, 100% en ligne.</p><button class="b" onclick="g('sim')">Démarrer ma simulation</button></div>`,sim:()=>`<div class="d"><button onclick="g('hero')" style="background:none;border:none;color:#86868B">← Retour</button><h2>Simulez votre crédit</h2><p>Montant: <b>${m.toLocaleString()} MAD</b></p><input type="range" min="5000" max="500000" value="${m}" oninput="m=this.value;u()"><p>Durée: <b>${d} mois</b></p><div style="display:flex;gap:10px">${[12,24,36,48,60].map(x=>`<button onclick="d=${x};u()" style="flex:1;padding:10px;background:${d===x?'#AB0017':'rgba(255,255,255,.05)'};border:none;border-radius:8px;color:#fff">${x}m</button>`).join('')}</div><div class="d" style="background:#0F1823;margin-top:20px"><p>Mensualité: <b style="font-size:24px;color:#AB0017">${Math.round(m/d*1.15).toLocaleString()} MAD</b></p></div><button class="b" onclick="g('contact')">Continuer →</button></div>`,contact:()=>`<div class="d"><button onclick="g('sim')" style="background:none;border:none;color:#86868B">← Retour</button><h2>Vos coordonnées</h2><input placeholder="Prénom *" id="p"><input placeholder="Nom *" id="n"><input placeholder="Téléphone *" id="t"><div class="d" style="background:#0F1823"><p style="color:#AB0017">⚠ Consentements obligatoires</p><label><input type="checkbox" id="c1"> Vérification identité</label><br><label><input type="checkbox" id="c2"> Traitement des données</label><br><label><input type="checkbox" id="c3"> Infos groupe Saham</label></div><button class="b" onclick="if(p.value&&n.value&&t.value&&c1.checked&&c2.checked&&c3.checked)g('docs');else alert('Remplissez tous les champs et cochez les cases')">Continuer →</button></div>`,docs:()=>`<div class="d"><button onclick="g('contact')" style="background:none;border:none;color:#86868B">← Retour</button><h2>Vos documents</h2><div id="dl"></div></div>`,wait:()=>`<div style="text-align:center;padding-top:40px"><div style="font-size:60px">⏳</div><h2>Dossier en cours d'étude</h2><p>Référence: EQD-${Math.random().toString(36).substr(2,8).toUpperCase()}</p><div class="d"><p>✓ Documents reçus</p><p style="color:#86868B">○ Vérification</p><p style="color:#86868B">○ Analyse crédit</p><p style="color:#86868B">○ Décision</p></div><p style="color:#86868B">4 à 24 heures</p></div>`,offer:()=>`<div style="text-align:center;padding-top:40px"><div style="font-size:60px;color:#16A34A">✓</div><h2>Crédit approuvé !</h2><div class="d"><p>Montant: <b>${m.toLocaleString()} MAD</b></p><p>Durée: <b>${d} mois</b></p><p>Mensualité: <b style="color:#AB0017">${Math.round(m/d*1.15).toLocaleString()} MAD</b></p></div><button class="b" onclick="g('success')">Accepter →</button></div>`,success:()=>`<div style="text-align:center;padding-top:40px"><div style="font-size:60px;color:#16A34A">✓</div><h2>Crédit confirmé !</h2><p>Votre dossier est signé.</div><button class="b" onclick="location.reload()">Nouvelle simulation</button></div>`};let docs=[{n:'CIN Recto',s:0},{n:'CIN Verso',s:0},{n:'RIB',s:0}];const rd=()=>{dl.innerHTML=docs.map((x,i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:16px;background:#0F1823;border-radius:8px;margin:8px 0"><span>${x.n}</span>${x.s?'<span style="color:#16A34A">✓ Reçu</span>':`<button onclick="docs[${i}].s=1;rd()" style="padding:8px 16px;background:rgba(255,255,255,.1);border:none;border-radius:6px;color:#fff">Upload</button>`}</div>`).join('')+(docs.every(x=>x.s)?`<button class="b" onclick="g('wait');setTimeout(()=>g('offer'),3000)">Soumettre →</button>`:'');const g=x=>{s=x;u();if(x==='docs')setTimeout(rd,10)};const u=()=>a.innerHTML=t[s]();u();</script></body></html>
